<!DOCTYPE html>

<head>

    <title>慈慧幼苗 Healthy Seed - 家長線上學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --primary-green: #68B04D;
            --accent-orange: #FF9F43;
            --soft-gray: #F8FAFB;
            --ink-black: #2D3436;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--soft-gray);
            color: var(--ink-black);
            scroll-behavior: smooth;
        }

        /* 導航欄毛玻璃效果 */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* 自定義顏色類別 */
        .bg-brand-green { background-color: var(--primary-green); }
        .text-brand-green { color: var(--primary-green); }
        .bg-brand-orange { background-color: var(--accent-orange); }
        .text-brand-orange { color: var(--accent-orange); }
        
        /* 課程卡片即將推出款式的虛線邊框 */
        .dashed-orange-border {
            border: 2px dashed rgba(255, 159, 67, 0.4);
        }

        #menu-toggle:checked ~ #mobile-menu {
            display: flex;
        }
    </style>
</head>
