<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慈慧幼苗 Healthy Seed - 家長線上學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --primary-green: #68B04D;
            --accent-orange: #FF9F43;
            --soft-gray: #F8FAFB;
            --ink-black: #2D3436;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--soft-gray);
            color: var(--ink-black);
            scroll-behavior: smooth;
        }

        /* 導航欄毛玻璃效果 */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* 自定義顏色類別 */
        .bg-brand-green { background-color: var(--primary-green); }
        .text-brand-green { color: var(--primary-green); }
        .bg-brand-orange { background-color: var(--accent-orange); }
        .text-brand-orange { color: var(--accent-orange); }
        
        /* 課程卡片即將推出款式的虛線邊框 */
        .dashed-orange-border {
            border: 2px dashed rgba(255, 159, 67, 0.4);
        }

        #menu-toggle:checked ~ #mobile-menu {
            display: flex;
        }
    </style>
</head>
<body>

    <nav class="glass-nav fixed top-0 left-0 w-full z-50 px-6 md:px-12 h-20 flex justify-between items-center shadow-sm">
        <div class="flex items-center">
            <a href="index.html" class="block py-1">
                <img src="HSP_Logo_New_VisualGuid-02.png" 
                     alt="慈慧幼苗 Healthy Seed" 
                     class="h-14 md:h-16 w-auto object-contain">
            </a>
        </div>

        <div class="hidden md:flex items-center space-x-8 font-bold text-gray-700">
            <a href="https://healthyseed.org/" class="hover:text-brand-green transition-colors">回到主頁</a>
            <a href="https://healthyseed.org/%E7%99%BB%E5%85%A5" class="bg-brand-green text-white px-6 py-2.5 rounded-full hover:opacity-90 transition-all font-bold inline-block text-center">立即登記/登入</a>
        </div>

        <div class="md:hidden flex items-center">
            <input type="checkbox" id="menu-toggle" class="hidden">
            <label for="menu-toggle" class="p-2 cursor-pointer text-gray-600"><i class="fas fa-bars text-xl"></i></label>
            <div id="mobile-menu" class="hidden absolute top-20 left-0 w-full bg-white flex-col p-6 space-y-4 shadow-xl font-bold z-50">
                <a href="https://healthyseed.org/" class="py-2 border-b">回到主頁</a>
                <a href="https://healthyseed.org/%E7%99%BB%E5%85%A5" class="bg-brand-green text-white px-6 py-2.5 rounded-full hover:opacity-90 transition-all font-bold inline-block text-center">立即登記/登入</a>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-16 md:pt-44 md:pb-24 px-6 md:px-12 bg-gradient-to-b from-green-50/60 via-white to-[#F8FAFB]">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-10 lg:gap-16">
            
            <div class="flex-1 text-center lg:text-left order-1 lg:order-1">
                <span class="inline-flex items-center gap-1.5 text-xs font-bold text-brand-green bg-green-100/60 px-3 py-1.5 rounded-full tracking-wider mb-5 border border-green-200/40 shadow-sm">
                    <i class="fas fa-star text-[10px] text-brand-orange animate-pulse"></i> 羅鷹石慈慧基金創辦資助
                </span>
                
                <h1 class="text-4xl md:text-6xl font-black text-gray-900 leading-tight mb-5 tracking-wide">
                    慈慧幼苗<br><span class="text-brand-green inline-block mt-1">家長學堂</span>
                </h1>
                
                <p class="text-gray-600 text-base md:text-lg leading-relaxed max-w-xl mb-8 mx-auto lg:mx-0">
                    「追求成長，與孩同行」— 我們為 0-6 歲孩子的家長提供最具實證支持的專業教育課程。
                </p>
                
                <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                    <a href="#courses" class="bg-brand-green text-white px-8 py-3.5 rounded-full flex items-center justify-center font-bold hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 transition-all shadow-md">
                        瀏覽所有課程 <i class="fas fa-search ml-2 text-sm opacity-90"></i>
                    </a>
                </div>
            </div>
            
            <div class="flex-1 w-full order-2 lg:order-2">
                <div class="w-full aspect-video bg-gray-100 rounded-[32px] overflow-hidden shadow-2xl border border-gray-200/60 relative transform hover:scale-[1.01] transition-transform duration-300">
                    <iframe class="w-full h-full"
                        src="https://www.youtube.com/embed/dXOvcI0V7A4"
                        title="慈慧幼苗 Healthy Seed 宣傳影片"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

        </div>
    </header>

    <section id="courses" class="py-20 px-6 md:px-12 bg-white rounded-t-[50px] shadow-[0_-15px_40px_rgba(0,0,0,0.01)]">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex justify-between items-end mb-12 border-b pb-4">
                <div>
                    <h2 class="text-3xl font-black text-gray-900 relative pb-2">
                        精選課程
                        <span class="absolute bottom-0 left-0 w-12 h-1 bg-brand-orange rounded-full"></span>
                    </h2>
                </div>
                <div class="text-gray-400 text-sm md:text-base font-medium">
                    陪伴您掌握育兒關鍵時刻
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                
                <div class="bg-white rounded-3xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 flex flex-col h-full border border-gray-100">
                    <div class="h-44 overflow-hidden relative">
                        <img src="course1.jpg"
